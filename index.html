<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Autonode v3</title>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
      }
    }
  </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
            background-color: #050505;
            color: #F0F0F0;
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';

        async function load() {
            try {
                const resp = await fetch('./autonode_final.jsx');
                if (!resp.ok) {
                    throw new Error(`Failed to load autonode_final.jsx: ${resp.status}`);
                }
                const text = await resp.text();

                // Transpile JSX with automatic runtime so it doesn't need to import React manually
                const transformed = Babel.transform(text, {
                    presets: [['react', { runtime: 'automatic' }]]
                }).code;

                // Create a blob URL to import as an ES module
                const blob = new Blob([transformed], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);

                const module = await import(url);
                const App = module.default;

                const root = createRoot(document.getElementById('root'));
                root.render(React.createElement(App));
            } catch (err) {
                document.getElementById('root').innerHTML = `<div style="padding: 20px; color: #f87171;">Failed to load application: ${err.message}</div>`;
                console.error(err);
            }
        }

        load();
    </script>
</body>

</html>
